<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scales Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 1.5rem; max-width: 820px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
.row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; align-items: center; }
.lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 7px; }
select { font-size: 15px; padding: 7px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
button { font-size: 14px; padding: 7px 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
button:hover { background: #f0f0ee; }
button.playing { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; align-items: center; }
.pill { font-size: 13px; padding: 4px 11px; border-radius: 20px; font-weight: 500; border: 1px solid #ddd; color: #888; background: #f3f3f0; }
.pill.W { background:#E6F1FB; color:#0C447C; border-color:#B5D4F4; }
.pill.H { background:#FAECE7; color:#712B13; border-color:#F5C4B3; }
.pill.A { background:#EEEDFE; color:#3C3489; border-color:#AFA9EC; }
.pill.arr { background:none; border:none; color:#ccc; padding:4px 2px; }
.badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:1.5rem; }
.badge { font-size:14px; padding:5px 13px; border-radius:20px; font-weight:500; cursor:pointer; display:inline-block; transition:transform 0.08s,filter 0.08s; user-select:none; }
.badge.sn { background:#1D9E75; color:#fff; border:1px solid #0F6E56; }
.badge.rn { background:#534AB7; color:#fff; border:1px solid #3C3489; }
.badge.lit { transform:scale(1.18); filter:brightness(1.4); }
.stave-wrap { overflow-x:auto; margin-bottom:1.5rem; background:#fff; border:1px solid #eee; border-radius:8px; padding:10px 0; }
.piano-wrap { overflow-x:auto; margin-bottom:1.5rem; }
.guitar-wrap { overflow-x:auto; }
.info { font-size:13px; color:#666; margin-top:1rem; line-height:1.6; }
</style>
</head>
<body>
<h1>🎵 Scales Explorer</h1>

<div class="row">
  <select id="rootSel">
    <option value="C">C</option>
    <option value="Cs">C#</option>
    <option value="Db">D♭</option>
    <option value="D">D</option>
    <option value="Ds">D#</option>
    <option value="Eb">E♭</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="Fs">F#</option>
    <option value="Gb">G♭</option>
    <option value="G">G</option>
    <option value="Gs">G#</option>
    <option value="Ab">A♭</option>
    <option value="A">A</option>
    <option value="As">A#</option>
    <option value="Bb">B♭</option>
    <option value="B">B</option>
  </select>
  <select id="scaleSel">
    <option value="major">Major</option>
    <option value="naturalMinor">Natural minor</option>
    <option value="harmonicMinor">Harmonic minor</option>
    <option value="pentatonicMajor">Major pentatonic</option>
    <option value="pentatonicMinor">Minor pentatonic</option>
    <option value="blues">Blues</option>
  </select>
  <div style="display:flex;align-items:center;gap:8px">
    <label for="tempoSlider" style="font-size:13px;color:#666;white-space:nowrap">Tempo</label>
    <input type="range" id="tempoSlider" min="40" max="192" value="96" step="1"
      style="width:110px;cursor:pointer;accent-color:#534AB7">
    <span id="tempoDisplay" style="font-size:13px;color:#534AB7;font-weight:600;min-width:52px">96 bpm</span>
  </div>
  <button id="playBtn" style="background:#534AB7;color:#fff;border-color:#3C3489;font-weight:600">▶ Play scale</button>
</div>

<div class="lbl">Pattern</div>
<div class="pills" id="patternRow"></div>

<div class="lbl">Notes — tap to hear</div>
<div class="badges" id="badgesRow"></div>

<div class="lbl">Notation</div>
<div class="stave-wrap"><svg id="staveSvg" style="display:block"></svg></div>
<div style="font-size:13px;color:#555;margin-bottom:1.5rem;line-height:1.7">
  Note how the flats and the sharps always follow in the same order:<br>
  <span style="color:#534AB7;font-weight:600">Sharps:</span> F♯ &nbsp;C♯ &nbsp;G♯ &nbsp;D♯ &nbsp;A♯ &nbsp;E♯ &nbsp;B♯<br>
  <span style="color:#534AB7;font-weight:600">Flats:</span> &nbsp;B♭ &nbsp;E♭ &nbsp;A♭ &nbsp;D♭ &nbsp;G♭ &nbsp;C♭ &nbsp;F♭
</div>

<div class="lbl">Piano</div>
<div class="piano-wrap"><svg id="pianoSvg" height="110" style="display:block"></svg></div>

<div class="lbl">Guitar (standard tuning)</div>
<div class="guitar-wrap"><svg id="guitarSvg" style="display:block"></svg></div>

<div class="info" id="infoBox"></div>

<div style="margin-top:2rem;border-top:1px solid #eee;padding-top:1.2rem">
  <div class="lbl">Amplitude Envelope</div>

  <!-- Envelope graphic -->
  <canvas id="adsrCanvas" width="400" height="90"
    style="display:block;width:100%;max-width:500px;border:1px solid #eee;border-radius:8px;background:#fff;margin-bottom:1rem"></canvas>

  <!-- ADSR sliders -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;max-width:500px">

    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em">Attack</label>
      <input type="range" id="atkSlider" min="5" max="500" value="25" step="1"
        style="width:100%;accent-color:#534AB7" oninput="updateADSR()">
      <span id="atkVal" style="font-size:12px;color:#534AB7;font-weight:600">25ms</span>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em">Decay</label>
      <input type="range" id="decSlider" min="20" max="800" value="160" step="1"
        style="width:100%;accent-color:#534AB7" oninput="updateADSR()">
      <span id="decVal" style="font-size:12px;color:#534AB7;font-weight:600">160ms</span>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em">Sustain</label>
      <input type="range" id="susSlider" min="0" max="100" value="25" step="1"
        style="width:100%;accent-color:#534AB7" oninput="updateADSR()">
      <span id="susVal" style="font-size:12px;color:#534AB7;font-weight:600">25%</span>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <label style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em">Release</label>
      <input type="range" id="relSlider" min="50" max="3000" value="1200" step="10"
        style="width:100%;accent-color:#534AB7" oninput="updateADSR()">
      <span id="relVal" style="font-size:12px;color:#534AB7;font-weight:600">1200ms</span>
    </div>

  </div>
</div>

<script>
const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Map string root key -> chromatic index
const ROOT_TO_CHR = {
  C:0, Cs:1, Db:1, D:2, Ds:3, Eb:3, E:4, F:5, Fs:6, Gb:6, G:7, Gs:8, Ab:8, A:9, As:10, Bb:10, B:11
};

// Display name for each root key
const ROOT_DISPLAY = {
  C:'C', Cs:'C#', Db:'D♭', D:'D', Ds:'D#', Eb:'E♭', E:'E', F:'F',
  Fs:'F#', Gb:'G♭', G:'G', Gs:'G#', Ab:'A♭', A:'A', As:'A#', Bb:'B♭', B:'B'
};

// Note spellings for each key — indexed by chromatic position 0-11
// Sharp keys use sharps, flat keys use flats
const KEY_SPELLINGS = {
  // Each array has 12 entries indexed by chromatic position 0-11.
  // null entries are non-scale tones — falls back to NAMES[] if needed.
  C:  ['C',   null, 'D',   null, 'E',   'F',   null, 'G',   null, 'A',   null,  'B'  ],
  G:  ['C',   null, 'D',   null, 'E',   null,  'F#', 'G',   null, 'A',   null,  'B'  ],
  D:  [null,  'C#', 'D',   null, 'E',   null,  'F#', 'G',   null, 'A',   null,  'B'  ],
  A:  [null,  'C#', 'D',   null, 'E',   null,  'F#', null,  'G#', 'A',   null,  'B'  ],
  E:  [null,  'C#', null,  'D#', 'E',   null,  'F#', null,  'G#', 'A',   null,  'B'  ],
  B:  [null,  'C#', null,  'D#', 'E',   null,  'F#', null,  'G#', null,  'A#',  'B'  ],
  Fs: [null,  'C#', null,  'D#', null,  'E#',  'F#', null,  'G#', null,  'A#',  'B'  ],
  Cs: ['B#',  'C#', null,  'D#', null,  'E#',  'F#', null,  'G#', null,  'A#',  null ],
  Gs: ['B#',  'C#', null,  'D#', null,  'E#',  null, 'F##', 'G#', null,  'A#',  null ],
  Ds: ['B#',  null, 'C##', 'D#', null,  'E#',  null, 'F##', 'G#', null,  'A#',  null ],
  As: ['B#',  null, 'C##', 'D#', null,  'E#',  null, 'F##', null, 'G##', 'A#',  null ],
  F:  ['C',   null, 'D',   null, 'E',   'F',   null, 'G',   null, 'A',   'Bb',  null ],
  Bb: ['C',   null, 'D',   'Eb', null,  'F',   null, 'G',   null, 'A',   'Bb',  null ],
  Eb: ['C',   null, 'D',   'Eb', null,  'F',   null, 'G',   'Ab', null,  'Bb',  null ],
  Ab: ['C',   'Db', null,  'Eb', null,  'F',   null, 'G',   'Ab', null,  'Bb',  null ],
  Db: ['C',   'Db', null,  'Eb', null,  'F',   'Gb', null,  'Ab', null,  'Bb',  null ],
  Gb: [null,  'Db', null,  'Eb', null,  'F',   'Gb', null,  'Ab', null,  'Bb',  'Cb' ],
};

const SHARP_ORDER = [6,1,8,3,9,4,11];
const FLAT_ORDER  = [11,4,9,2,7,0,5];

// Key signatures — sharp/flat keys determined by root string
const MAJOR_KEYSIG = {
  C:  {type:'none', n:0},
  G:  {type:'sharp',n:1}, D:  {type:'sharp',n:2}, A:  {type:'sharp',n:3},
  E:  {type:'sharp',n:4}, B:  {type:'sharp',n:5}, Fs: {type:'sharp',n:6}, Cs: {type:'sharp',n:7},
  // Sharp enharmonics — own sharp key signatures
  Gs: {type:'sharp',n:8}, Ds: {type:'sharp',n:9}, As: {type:'sharp',n:10},
  // Flat keys
  F:  {type:'flat', n:1}, Bb: {type:'flat', n:2},  Eb: {type:'flat', n:3},
  Ab: {type:'flat', n:4}, Db: {type:'flat', n:5},  Gb: {type:'flat', n:6},
};

// Minor key -> relative major root string
const MINOR_TO_MAJOR = {
  A:'C', E:'G', B:'D', Fs:'A', Cs:'E', Gs:'B', Ds:'Fs', As:'Cs',
  D:'F', G:'Bb', C:'Eb', F:'Ab', Bb:'Db', Eb:'Gb',
  Ds:'Gb', Gs:'B', As:'Cs',
};

function getKeySig(rootKey, scaleKey) {
  let lookupKey = rootKey;
  if (scaleKey === 'naturalMinor' || scaleKey === 'harmonicMinor' ||
      scaleKey === 'pentatonicMinor' || scaleKey === 'blues') {
    lookupKey = MINOR_TO_MAJOR[rootKey] || rootKey;
  }
  return MAJOR_KEYSIG[lookupKey] || {type:'none', n:0};
}

function getSpelling(chrIdx, rootKey, scaleKey) {
  let lookupKey = rootKey;
  if (scaleKey === 'naturalMinor' || scaleKey === 'harmonicMinor' ||
      scaleKey === 'pentatonicMinor' || scaleKey === 'blues') {
    const keySig = getKeySig(rootKey, scaleKey);
    lookupKey = keySig.type === 'flat' ? 'Bb' : 'G';
  }
  const spellings = KEY_SPELLINGS[lookupKey] || KEY_SPELLINGS['C'];
  return spellings[chrIdx] || NAMES[chrIdx];
}

const IS_BLACK = [0,1,0,1,0,0,1,0,1,0,1,0];

const SCALES = {
  major:          {steps:[2,2,1,2,2,2,1], label:'Major', pat:['W','W','H','W','W','W','H']},
  naturalMinor:   {steps:[2,1,2,2,1,2,2], label:'Natural minor', pat:['W','H','W','W','H','W','W']},
  harmonicMinor:  {steps:[2,1,2,2,1,3,1], label:'Harmonic minor', pat:['W','H','W','W','H','A','H']},
  pentatonicMajor:{steps:[2,2,3,2,3],     label:'Major pentatonic', pat:['W','W','1½','W','1½']},
  pentatonicMinor:{steps:[3,2,2,3,2],     label:'Minor pentatonic', pat:['1½','W','W','1½','W']},
  blues:          {steps:[3,2,1,1,3,2],   label:'Blues', pat:['1½','W','H','H','1½','W']},
};
const INFO = {
  major:'Bright, happy sound. Used in pop, folk, and classical. Think "Happy Birthday" or "Twinkle Twinkle".',
  naturalMinor:'Darker, sadder sound. Used in rock and classical. Think "Greensleeves" or most metal riffs.',
  harmonicMinor:'Natural minor with a raised 7th — gives an exotic, Spanish/Middle Eastern flavour.',
  pentatonicMajor:'Only 5 notes — bright and open. Used in pop, country, and Asian music.',
  pentatonicMinor:'Only 5 notes — dark and bluesy. The backbone of rock guitar soloing.',
  blues:'The minor pentatonic plus the ♭5 "blue note". That extra tension is what makes blues sound like blues.',
};




// Stave layout constants
const SL = 12;
const STAVE_TOP = 48;

function posToY(pos) {
  return STAVE_TOP + (10 - pos) * (SL / 2);
}

// Diatonic step within octave
const DIATONIC_STEP = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};

function toStavePos(diatonicName, oct, chrIdx) {
  const letter = diatonicName[0];
  let staveOct = oct;
  // Cb: chromatic B (11) but diatonic C — C belongs one octave higher
  if (letter === 'C' && chrIdx === 11) staveOct = oct + 1;
  // B#: chromatic C (0) but diatonic B — B belongs one octave lower
  if (letter === 'B' && chrIdx === 0) staveOct = oct - 1;
  // E#: chromatic F (5) but diatonic E — no octave correction needed
  // F#, etc — all fine as-is
  return (staveOct - 4) * 7 + DIATONIC_STEP[letter];
}

// Correct diatonic note spellings for every major key (chromatic index -> letter name)
// So Ab major uses Ab Bb C Db Eb F G, not G# A# etc.


function buildAscSequence(rootKey, key) {
  const rootIdx = ROOT_TO_CHR[rootKey];
  const steps = SCALES[key].steps;
  let asc=[{i:rootIdx, oct:4, pianoOct:3, name:getSpelling(rootIdx,rootKey,key)}], i=rootIdx, oct=4, poct=3;
  for(let s=0; s<steps.length-1; s++){
    i+=steps[s];
    if(i>=12){i-=12; oct++; poct++;}
    asc.push({i, oct, pianoOct:poct, name:getSpelling(i,rootKey,key)});
  }
  return asc;
}

function buildSequence(rootKey, key) {
  const asc = buildAscSequence(rootKey, key);
  const rootIdx = ROOT_TO_CHR[rootKey];
  const top = {i:rootIdx, oct:5, pianoOct:4, name:getSpelling(rootIdx,rootKey,key)};
  // Descending: reverse of ascending (no repeat of top, no repeat of bottom)
  const desc = [...asc].reverse();
  return [...asc, top, ...desc];
}

// ── ADSR ──────────────────────────────────────────────────────────────────────
let ADSR = { atk:0.025, dec:0.16, sus:0.25, rel:1.2 };

function updateADSR() {
  const atk = parseInt(document.getElementById('atkSlider').value);
  const dec = parseInt(document.getElementById('decSlider').value);
  const sus = parseInt(document.getElementById('susSlider').value);
  const rel = parseInt(document.getElementById('relSlider').value);
  document.getElementById('atkVal').textContent = atk + 'ms';
  document.getElementById('decVal').textContent = dec + 'ms';
  document.getElementById('susVal').textContent = sus + '%';
  document.getElementById('relVal').textContent = rel + 'ms';
  ADSR = { atk: atk/1000, dec: dec/1000, sus: sus/100, rel: rel/1000 };
  drawADSR();
}

function drawADSR() {
  const canvas = document.getElementById('adsrCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = { l:28, r:16, t:12, b:28 };
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  const { atk, dec, sus, rel } = ADSR;

  // Time segments — sustain shown as fixed proportion of display
  const total = atk + dec + 0.3 + rel; // 0.3s fixed sustain hold
  const toX = t => pad.l + (t / total) * iW;
  const toY = v => pad.t + (1 - v) * iH;

  const x0 = pad.l;
  const x1 = toX(atk);                    // end of attack
  const x2 = toX(atk + dec);              // end of decay
  const x3 = toX(atk + dec + 0.3);        // end of sustain
  const x4 = toX(atk + dec + 0.3 + rel);  // end of release
  const y0 = toY(0);
  const y1 = toY(1);     // peak
  const ys = toY(sus);   // sustain level

  // Filled area
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, ys);
  ctx.lineTo(x3, ys);
  ctx.lineTo(x4, y0);
  ctx.lineTo(x0, y0);
  ctx.fillStyle = 'rgba(83,74,183,0.12)';
  ctx.fill();

  // Envelope line
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, ys);
  ctx.lineTo(x3, ys);
  ctx.lineTo(x4, y0);
  ctx.strokeStyle = '#534AB7';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots at key points
  [[x1,y1],[x2,ys],[x3,ys]].forEach(([cx,cy])=>{
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#534AB7';
    ctx.fill();
  });

  // X axis labels
  ctx.fillStyle = '#aaa';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  [['A', x1],['D', x2],['S', (x2+x3)/2],['R', (x3+x4)/2]].forEach(([lbl,x])=>{
    ctx.fillText(lbl, x, H - 8);
  });

  // Y axis ticks
  ctx.textAlign = 'right';
  ctx.fillText('1', pad.l - 4, toY(1) + 4);
  ctx.fillText('0', pad.l - 4, toY(0) + 4);
  if (sus > 0.05 && sus < 0.95) {
    ctx.fillStyle = '#999';
    ctx.fillText(Math.round(sus*100)+'%', pad.l - 4, ys + 4);
    // Dashed sustain reference line
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pad.l, ys);
    ctx.lineTo(x3, ys);
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  }
}


let actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function freqHz(idx,oct){return 440*Math.pow(2,(idx-9+(oct-4)*12)/12);}

function playTone(idx,oct,dur,t0){
  const c=getCtx();
  const t=c.currentTime+(t0||0);
  const f=freqHz(idx,oct);

  const filter=c.createBiquadFilter();
  filter.type='lowpass';
  filter.frequency.value=Math.min(3500+f*1.5, 7000);
  filter.Q.value=0.4;
  filter.connect(c.destination);

  // Fewer partials, no high-frequency ringers
  const partials=[
    [1,  0.50, 3.5],
    [2,  0.22, 5.0],
    [3,  0.12, 7.0],
    [4,  0.07, 9.5],
    [5,  0.04, 12.0],
  ];

  partials.forEach(([mult, amp, decay])=>{
    const osc=c.createOscillator();
    const g=c.createGain();
    osc.type='sine';
    osc.frequency.value=f*mult;
    osc.connect(g);
    g.connect(filter);

    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(amp, t + ADSR.atk);
    g.gain.exponentialRampToValueAtTime(Math.max(amp * ADSR.sus, 0.0001), t + ADSR.atk + ADSR.dec);
    g.gain.exponentialRampToValueAtTime(Math.max(amp * ADSR.sus * 0.8, 0.0001), t + ADSR.atk + ADSR.dec + 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, t + ADSR.atk + ADSR.dec + 0.3 + ADSR.rel / decay);

    osc.start(t);
    osc.stop(t+2.0);
  });
}

// ── Light-up ──────────────────────────────────────────────────────────────────
let litChr=-1, litOct=-1, litSeqPos=-1, litTimer=null;

function flashNote(chrIdx, oct, seqPos, dur) {
  if (litTimer) clearTimeout(litTimer);
  litChr=chrIdx; litOct=oct; litSeqPos=seqPos;
  updateLit();
  litTimer = setTimeout(()=>{litChr=-1; litOct=-1; litSeqPos=-1; litTimer=null; updateLit();}, dur*1000);
}

function updateLit(){
  // Map litSeqPos (may be in descending half) back to ascending badge index
  // Ascending half: 0..ascLen, descending half: ascLen+1..end (mirrors ascending in reverse)
  const ascLen = currentSeq.length; // 7 notes (no top tonic)
  let badgePos = litSeqPos;
  if (litSeqPos > ascLen) {
    // descending: ascLen+1 maps to ascLen-1, ascLen+2 to ascLen-2, etc.
    badgePos = ascLen - (litSeqPos - ascLen);
  }
  document.querySelectorAll('.badge').forEach(el=>{
    parseInt(el.dataset.si)===badgePos ? el.classList.add('lit') : el.classList.remove('lit');
  });
  document.querySelectorAll('[data-ni]').forEach(el=>{
    const ni=parseInt(el.dataset.ni), isRoot=el.dataset.root==='1', isBlack=el.dataset.black==='1';
    // For piano keys match both note and octave; guitar dots have no octave so match by note only
    const elOct = el.dataset.oct !== undefined ? parseInt(el.dataset.oct) : litOct;
    const lit = ni===litChr && elOct===litOct;
    if(el.tagName==='rect'){
      el.style.fill = lit ? (isRoot?'#b8b0ff':isBlack?'#57e8b8':'#b8f5e2') : isRoot?'#534AB7':isBlack?'#1D9E75':'#5DCAA5';
    } else if(el.tagName==='circle'){
      el.style.fill = lit ? (isRoot?'#b8b0ff':'#57e8b8') : isRoot?'#534AB7':'#1D9E75';
    }
  });
  document.querySelectorAll('ellipse[data-si]').forEach(el=>{
    const si=parseInt(el.dataset.si);
    const isRoot=el.getAttribute('fill')==='#534AB7'||el.getAttribute('fill')==='#b8b0ff';
    if(si===litSeqPos){ el.style.fill='#FFD700'; el.style.stroke='#e6a800'; }
    else { const c=isRoot?'#534AB7':'#1D9E75'; el.style.fill=c; el.style.stroke=c; }
  });
}

function tapNote(idx,oct,pianoOct,seqPos){
  playTone(idx,oct,0.5,0);
  flashNote(idx,pianoOct,seqPos,0.45);
}

// ── Stave ─────────────────────────────────────────────────────────────────────
function drawStave(rootKey, scaleKey, seq) {
  const svg = document.getElementById('staveSvg');
  const W = 820, H = 150;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  let h = '';

  // 5 staff lines
  for(let i=0; i<5; i++){
    const y = STAVE_TOP + i*SL;
    h += `<line x1="12" y1="${y}" x2="${W-12}" y2="${y}" stroke="#333" stroke-width="1.2"/>`;
  }

  // Treble clef — large Unicode glyph sized to span stave
  // Font size ~6.5× SL gives good coverage from below bottom line to above top
  const clefSize = SL * 6.0;
  const clefY = STAVE_TOP + 4*SL;
  h += `<text x="8" y="${clefY}" font-size="${clefSize}px" font-family="Georgia,serif" fill="#222" style="user-select:none">𝄞</text>`;

  // Key signature — starts right after clef (clef occupies ~38px at this size)
  const keySig = getKeySig(rootKey, scaleKey);
  const keySigX = 44;
  const accSize = SL * 2.2;

  // Sharp stave positions (treble): F5=10, C5=7, G5=11, D5=8, A4=5, E5=9, B4=6
  const sharpPos = [10, 7, 11, 8, 5, 9, 6];
  // Flat stave positions (treble):  B4=6, E5=9, A4=5, D5=8, G4=4, C5=7, F4=3
  const flatPos  = [7, 10, 6, 9, 5, 8, 4];

  let keySigWidth = 0;
  if(keySig.type === 'sharp'){
    for(let i=0; i<keySig.n; i++){
      const y = posToY(sharpPos[i]);
      h += `<text x="${keySigX + i*14}" y="${y+accSize*0.38}" font-size="${accSize}px" font-family="Georgia,serif" fill="#222" style="user-select:none">♯</text>`;
    }
    keySigWidth = keySig.n * 14 + 10;
  } else if(keySig.type === 'flat'){
    for(let i=0; i<keySig.n; i++){
      const y = posToY(flatPos[i]);
      h += `<text x="${keySigX + i*13}" y="${y+accSize*0.48}" font-size="${accSize}px" font-family="Georgia,serif" fill="#222" style="user-select:none">♭</text>`;
    }
    keySigWidth = keySig.n * 13 + 10;
  }

  // Key sig accidentals set (for deciding which notes need inline accidentals)
  const keySigAcc = keySig.type==='sharp' ? SHARP_ORDER.slice(0,keySig.n)
                  : keySig.type==='flat'  ? FLAT_ORDER.slice(0,keySig.n) : [];

  // Notes
  const noteStartX = keySigX + keySigWidth + 12;
  const noteSpacing = Math.min(44, (W - noteStartX - 20) / seq.length);

  seq.forEach((n, i) => {
    const x = noteStartX + i * noteSpacing + noteSpacing * 0.5;
    const pos = toStavePos(n.name, n.oct, n.i);
    const y = posToY(pos);
    const isRoot = i===0 || i===seq.length-1;
    const col = isRoot ? '#534AB7' : '#1D9E75';

    // Ledger lines below staff (pos 0 = C4, pos 1 = D4)
    if(pos <= 1){
      for(let lp=0; lp>=pos; lp-=2){
        h += `<line x1="${x-9}" y1="${posToY(lp)}" x2="${x+9}" y2="${posToY(lp)}" stroke="#333" stroke-width="1.2"/>`;
      }
    }
    // Ledger lines above staff (pos 12 = A5, pos 11 = G5 is above top line pos 10)
    if(pos >= 12){
      for(let lp=12; lp<=pos; lp+=2){
        h += `<line x1="${x-9}" y1="${posToY(lp)}" x2="${x+9}" y2="${posToY(lp)}" stroke="#333" stroke-width="1.2"/>`;
      }
    }

    // No inline accidentals needed — key signature covers all alterations

    // Stem
    const stemUp = pos < 6;
    if(stemUp){
      h += `<line x1="${x+5.5}" y1="${y}" x2="${x+5.5}" y2="${y-SL*2.8}" stroke="${col}" stroke-width="1.6"/>`;
    } else {
      h += `<line x1="${x-5.5}" y1="${y}" x2="${x-5.5}" y2="${y+SL*2.8}" stroke="${col}" stroke-width="1.6"/>`;
    }

    // Notehead
    h += `<ellipse cx="${x}" cy="${y}" rx="6" ry="4.2" transform="rotate(-15,${x},${y})" fill="${col}" stroke="${col}" stroke-width="0.5" data-si="${i}" style="transition:fill 0.08s,stroke 0.08s; cursor:pointer" onclick="tapNote(${n.i},${n.oct},${n.pianoOct},${i})"/>`;
  });

  svg.innerHTML = h;
}

// ── Piano ─────────────────────────────────────────────────────────────────────
function drawPiano(rootIdx, scaleKey, rootKey){
  const svg=document.getElementById('pianoSvg');
  const scaleSet=new Set(currentSeq.map(n=>n.i));
  const ww=44,wh=97,bw=29,bh=61;

  // Fixed 2-octave keyboard: C3 to C5 (25 keys)
  const WHITE_IN_OCT = [0,2,4,5,7,9,11]; // C D E F G A B
  const BLACK_IN_OCT = [
    {ci:1, pos:0.6},  // C#
    {ci:3, pos:1.6},  // D#
    {ci:6, pos:3.6},  // F#
    {ci:8, pos:4.6},  // G#
    {ci:10,pos:5.6},  // A#
  ];

  let whites=[], blacks=[];
  let wIdx=0;
  // Two octaves: C3 to C5
  for(let oct=3; oct<=4; oct++){
    WHITE_IN_OCT.forEach(ci=>{
      whites.push({ci, oct, wIdx: wIdx++});
    });
  }
  // Add top C5
  whites.push({ci:0, oct:5, wIdx: wIdx++});

  // Black keys for both octaves
  blacks = [];
  const leftInOct = [0,1,3,4,5];
  for(let oct=3; oct<=4; oct++){
    const octOffset = (oct-3)*7;
    BLACK_IN_OCT.forEach((b,bi)=>{
      blacks.push({ci:b.ci, oct, leftWIdx: octOffset + leftInOct[bi]});
    });
  }

  const W = whites.length * ww + 2;
  svg.setAttribute('width', W);
  svg.setAttribute('height', '110');
  svg.setAttribute('viewBox', `0 0 ${W} 110`);

  let h='';

  // White keys
  whites.forEach((k,i)=>{
    const ins = scaleSet.has(k.ci);
    const isR = k.ci === rootIdx;
    let fill = 'white';
    if(isR) fill='#534AB7';
    else if(ins) fill='#5DCAA5';
    const x = i*ww+1;
    const sp = currentSeq.findIndex(n=>n.i===k.ci);
    const da = (ins||isR) ? `data-ni="${k.ci}" data-oct="${k.oct}" data-root="${isR?1:0}" data-black="0"` : '';
    const oc = (ins||isR) ? `onclick="tapNote(${k.ci},${k.oct},${k.oct},${sp})"` : '';
    h+=`<rect x="${x}" y="2" width="${ww-1}" height="${wh}" rx="3" fill="${fill}" stroke="#ccc" stroke-width="0.5" style="cursor:${ins||isR?'pointer':'default'}" ${da} ${oc}/>`;
    if(ins||isR){
      const tf=isR?'#fff':'#085041';
      h+=`<text x="${x+ww/2}" y="${wh-7}" text-anchor="middle" font-size="10" fill="${tf}" style="pointer-events:none">${getSpelling(k.ci,rootKey,scaleKey)||NAMES[k.ci]}</text>`;
    }
  });

  // Black keys
  blacks.forEach(k=>{
    const ins = scaleSet.has(k.ci);
    const isR = k.ci === rootIdx;
    let fill = '#222';
    if(isR) fill='#534AB7';
    else if(ins) fill='#1D9E75';
    const x = k.leftWIdx*ww + 1 + ww - bw/2;
    const sp = currentSeq.findIndex(n=>n.i===k.ci);
    const da = (ins||isR) ? `data-ni="${k.ci}" data-oct="${k.oct}" data-root="${isR?1:0}" data-black="1"` : '';
    const oc = (ins||isR) ? `onclick="tapNote(${k.ci},${k.oct},${k.oct},${sp})"` : '';
    h+=`<rect x="${x}" y="2" width="${bw}" height="${bh}" rx="2" fill="${fill}" stroke="#111" stroke-width="0.5" style="cursor:${ins||isR?'pointer':'default'}" ${da} ${oc}/>`;
    if(ins||isR){
      h+=`<text x="${x+bw/2}" y="${bh-4}" text-anchor="middle" font-size="9" fill="white" style="pointer-events:none">${getSpelling(k.ci,rootKey,scaleKey)||NAMES[k.ci]}</text>`;
    }
  });

  svg.innerHTML=h;
}

// ── Guitar ────────────────────────────────────────────────────────────────────
function drawGuitar(scaleSet, rootIdx, ascSeq){
  const svg = document.getElementById('guitarSvg');

  // Find one clean position per scale note from currentSeq (ascending, 8 notes)
  // Strategy: walk across the 6 strings finding the lowest fret for each note in turn,
  // staying in a comfortable position window (frets 1-12).
  // String open notes (high to low): E4=4, B3=11, G3=7, D3=2, A2=9, E2=4
  const stringOpen = [4,11,7,2,9,4]; // chromatic index of open string, high->low
  const stringOct  = [4, 3, 3, 3, 2, 2]; // octave of open string (E4,B3,G3,D3,A2,E2)

  // Convert string+fret to a single pitch number (midi-like: C4=48)
  function pitchNum(si, f) {
    const raw = stringOpen[si] + f;
    return (stringOct[si] + Math.floor(raw / 12)) * 12 + (raw % 12);
  }

  function candidatesForNote(n) {
    const candidates = [];
    for (let si = 0; si < stringOpen.length; si++) {
      for (let f = 0; f <= 12; f++) {
        const raw = stringOpen[si] + f;
        if ((raw % 12) === n.i) {
          const oct = stringOct[si] + Math.floor(raw / 12);
          if (oct === n.oct) {
            candidates.push({ si, f, oct, pitch: pitchNum(si, f) });
          }
        }
      }
    }
    return candidates;
  }

  function buildPositions(seq) {
    const pos = [];
    let lastPitch = -1;
    for (const n of seq) {
      const candidates = candidatesForNote(n)
        .filter(c => c.pitch > lastPitch)
        .sort((a, b) => (a.f === 0 ? a.f - 3 : a.f) - (b.f === 0 ? b.f - 3 : b.f));
      const best = candidates[0];
      if (!best) return null;
      lastPitch = best.pitch;
      pos.push({ ...n, si: best.si, fret: best.f, oct: best.oct, pianoOct: best.oct - 1 });
    }
    return pos;
  }

  // Try sequence as-is; if any note can't be placed, shift whole sequence down an octave
  let positions = buildPositions(ascSeq);
  if (!positions) {
    const shifted = ascSeq.map(n => ({ ...n, oct: n.oct - 1, pianoOct: n.pianoOct - 1 }));
    positions = buildPositions(shifted) || [];
  }

  // Layout: show a fretboard spanning the fret range used (ignoring open strings for range)
  const frettedFrets = positions.filter(p=>p.fret>0).map(p=>p.fret);
  const fretMin = frettedFrets.length ? Math.max(1, Math.min(...frettedFrets)) : 1;
  const fretMax = frettedFrets.length ? Math.min(12, Math.max(...frettedFrets) + 1) : 5;
  const fretCount = fretMax - fretMin + 1;

  const fw = 52, sh = 22, lp = 52, tp = 18; // lp wider to fit open string dots
  const numStrings = 6;
  const W = lp + fretCount * fw + 20;
  const H = tp + numStrings * sh + 10;

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  let h = '';

  // Fret lines
  for (let f = 0; f <= fretCount; f++) {
    const x = lp + f * fw;
    const isNut = (fretMin === 1 && f === 0);
    h += `<line x1="${x}" y1="${tp}" x2="${x}" y2="${tp + numStrings*sh}" stroke="#ddd" stroke-width="${isNut?3:0.5}"/>`;
  }

  // Fret number labels
  for (let f = fretMin; f <= fretMax; f++) {
    const x = lp + (f - fretMin + 0.5) * fw;
    h += `<text x="${x}" y="${tp-5}" text-anchor="middle" font-size="10" fill="#bbb">${f}</text>`;
  }

  // String lines and labels
  const snames = ['E','B','G','D','A','E'];
  for (let si = 0; si < numStrings; si++) {
    const y = tp + si * sh + sh / 2;
    h += `<line x1="${lp}" y1="${y}" x2="${lp + fretCount*fw}" y2="${y}" stroke="#ddd" stroke-width="0.8"/>`;
    h += `<text x="${lp-28}" y="${y+4}" text-anchor="middle" font-size="11" fill="#aaa">${snames[si]}</text>`;
  }

  // Draw the dots
  positions.forEach((p, idx) => {
    const isRoot = idx === 0;
    const fill = isRoot ? '#534AB7' : '#1D9E75';
    const sp = currentPlaySeq.findIndex(n => n.i === p.i && n.oct === p.oct);
    let x, y;
    y = tp + p.si * sh + sh / 2;
    if (p.fret === 0) {
      // Open string — circle left of the nut
      x = lp - 14;
      h += `<circle cx="${x}" cy="${y}" r="8" fill="none" stroke="${fill}" stroke-width="2" data-ni="${p.i}" data-root="${isRoot?1:0}" data-black="0" style="cursor:pointer" onclick="tapNote(${p.i},${p.oct},${p.pianoOct},${sp})"/>`;
      h += `<text x="${x}" y="${y+4}" text-anchor="middle" font-size="9" fill="${fill}" style="pointer-events:none">${p.name}</text>`;
    } else {
      x = lp + (p.fret - fretMin + 0.5) * fw;
      h += `<circle cx="${x}" cy="${y}" r="9" fill="${fill}" data-ni="${p.i}" data-root="${isRoot?1:0}" data-black="0" style="cursor:pointer" onclick="tapNote(${p.i},${p.oct},${p.pianoOct},${sp})"/>`;
      h += `<text x="${x}" y="${y+4}" text-anchor="middle" font-size="9" fill="white" style="pointer-events:none">${p.name}</text>`;
    }
  });

  svg.innerHTML = h;
}

// ── Render ────────────────────────────────────────────────────────────────────
let currentSeq = [];
let currentPlaySeq = [];

function render(){
  const rootKey=document.getElementById('rootSel').value;
  const rootIdx=ROOT_TO_CHR[rootKey];
  const scaleKey=document.getElementById('scaleSel').value;
  const scale=SCALES[scaleKey];
  currentSeq=buildAscSequence(rootKey,scaleKey);
  const playSeq=buildSequence(rootKey,scaleKey);
  currentPlaySeq=playSeq;
  const scaleSet=new Set(currentSeq.map(n=>n.i));
  const degs=['1','2','3','4','5','6','7','1'];

  document.getElementById('patternRow').innerHTML=scale.pat.map((p,i)=>{
    const cls=p==='W'?'W':p==='H'?'H':'A';
    const lbl=p==='W'?'Whole':p==='H'?'Half':'1½';
    return (i?`<span class="pill arr">→</span>`:'')+`<span class="pill ${cls}">${lbl}</span>`;
  }).join('');

  // Badges: show only ascending notes (8 notes, no duplicates)
  const ascWithTop = currentPlaySeq.slice(0, currentSeq.length + 1);
  document.getElementById('badgesRow').innerHTML=ascWithTop.map((n,i)=>{
    const isR=i===0||i===ascWithTop.length-1;
    return `<span class="badge ${isR?'rn':'sn'}" data-ni="${n.i}" data-si="${i}" onclick="tapNote(${n.i},${n.oct},${n.pianoOct},${i})">${n.name}</span>`;
  }).join('');

  drawStave(rootKey,scaleKey,currentPlaySeq);
  drawPiano(rootIdx,scaleKey,rootKey);
  drawGuitar(scaleSet, rootIdx, currentPlaySeq.slice(0, currentSeq.length + 1));
  document.getElementById('infoBox').textContent=`${ROOT_DISPLAY[rootKey]} ${scale.label}: ${INFO[scaleKey]}`;
}

// ── Play ──────────────────────────────────────────────────────────────────────
document.getElementById('tempoSlider').addEventListener('input', function(){
  document.getElementById('tempoDisplay').textContent = this.value + ' bpm';
});

let playing=false;
let playTimers=[];

function stopPlayback(){
  playTimers.forEach(t=>clearTimeout(t));
  playTimers=[];
  playing=false;
  litChr=-1; litOct=-1; litSeqPos=-1; litTimer=null;
  updateLit();
  const btn=document.getElementById('playBtn');
  btn.textContent='▶ Play scale';
  btn.style.background='#534AB7';
  btn.style.color='#fff';
}

document.getElementById('playBtn').addEventListener('click',()=>{
  if(playing){ stopPlayback(); return; }
  const btn=document.getElementById('playBtn');
  btn.textContent='■ Stop';
  btn.style.background='#c0392b';
  btn.style.color='#fff';
  playing=true;
  playTimers=[];
  const bpm = parseInt(document.getElementById('tempoSlider').value);
  const dur = 60 / bpm;
  const noteDur = dur * 0.85;
  currentPlaySeq.forEach((n,i)=>{
    playTimers.push(setTimeout(()=>{
      if(!playing) return;
      playTone(n.i,n.oct,noteDur,0);
      if(litTimer) clearTimeout(litTimer);
      litChr=n.i; litOct=n.pianoOct; litSeqPos=i;
      updateLit();
    }, i*dur*1000));
  });
  playTimers.push(setTimeout(()=>{ stopPlayback(); }, currentPlaySeq.length*dur*1000+300));
});

document.getElementById('rootSel').addEventListener('change',render);
document.getElementById('scaleSel').addEventListener('change',render);
render();
drawADSR();
</script>
